name: ClaudeUsage
options:
  bundleIdPrefix: com.claudeusage
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.7.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - ClaudeUsage/Sources
    resources:
      - path: ClaudeUsage/Resources/fetch-quota.sh
        buildPhase: resources

    info:
      path: ClaudeUsage/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Usage
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: https://raw.githubusercontent.com/eylonshm/claude-usage-widget/main/appcast.xml
        SUPublicEDKey: /wx7c+JEZuhhQj1p0ULc87qrTGz9irqpwXDSz2BL2VI=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusage.app
        CODE_SIGN_ENTITLEMENTS: ClaudeUsage/Resources/ClaudeUsage.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_NAME: Claude Usage
        MARKETING_VERSION: "1.2.22"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: ClaudeUsage/Resources/ClaudeUsage.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.claudeusage.shared

  ClaudeUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - ClaudeUsageWidget/Sources
    info:
      path: ClaudeUsageWidget/Resources/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusage.app.widget
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageWidget/Resources/ClaudeUsageWidget.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_NAME: ClaudeUsageWidgetExtension
        MARKETING_VERSION: "1.2.22"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: ClaudeUsageWidget/Resources/ClaudeUsageWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.claudeusage.shared
    dependencies:
      - target: ClaudeUsage
        embed: false
        link: false

schemes:
  ClaudeUsage:
    build:
      targets:
        ClaudeUsage: all
        ClaudeUsageWidget: all
    run:
      config: Debug
