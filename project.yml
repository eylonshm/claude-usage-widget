name: ClaudeUsage
options:
  bundleIdPrefix: com.claudeusage
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.7.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - ClaudeUsage/Sources
    resources:
      - path: ClaudeUsage/Resources/fetch-quota.sh
        buildPhase: resources
    info:
      path: ClaudeUsage/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Usage
        SUFeedURL: https://raw.githubusercontent.com/eylonshm/claude-usage-widget/main/appcast.xml
        SUPublicEDKey: /wx7c+JEZuhhQj1p0ULc87qrTGz9irqpwXDSz2BL2VI=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusage.app
        CODE_SIGN_ENTITLEMENTS: ClaudeUsage/Resources/ClaudeUsage.entitlements
        PRODUCT_NAME: Claude Usage
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: ClaudeUsage/Resources/ClaudeUsage.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.claudeusage.shared

  ClaudeUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - ClaudeUsageWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusage.app.widget
        INFOPLIST_VALUES: >-
          MACOSX_DEPLOYMENT_TARGET=14.0
          NSExtension={NSExtensionPointIdentifier=com.apple.widgetkit-extension;}
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageWidget/Resources/ClaudeUsageWidget.entitlements
        PRODUCT_NAME: ClaudeUsageWidgetExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
    entitlements:
      path: ClaudeUsageWidget/Resources/ClaudeUsageWidget.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.claudeusage.shared
    dependencies:
      - target: ClaudeUsage
        embed: false
        link: false

schemes:
  ClaudeUsage:
    build:
      targets:
        ClaudeUsage: all
        ClaudeUsageWidget: all
    run:
      config: Debug
