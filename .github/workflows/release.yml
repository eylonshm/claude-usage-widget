name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # List available Xcode versions and select the latest
          ls /Applications/ | grep Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: |
          # Regenerate project with the runner's Xcode version
          rm -rf ClaudeUsage.xcodeproj
          xcodegen generate

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_CERT" | tr -d '\n' | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build Release (unsigned)
        run: |
          xcodebuild \
            -project ClaudeUsage.xcodeproj \
            -scheme ClaudeUsage \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build"

      - name: Embed widget extension and resources
        run: |
          mkdir -p "build/Claude Usage.app/Contents/PlugIns"
          cp -R "build/ClaudeUsageWidgetExtension.appex" "build/Claude Usage.app/Contents/PlugIns/"
          mkdir -p "build/Claude Usage.app/Contents/Resources"
          cp ClaudeUsage/Resources/fetch-quota.sh "build/Claude Usage.app/Contents/Resources/"
          chmod +x "build/Claude Usage.app/Contents/Resources/fetch-quota.sh"

      - name: Sign app with Developer ID
        run: |
          APP="build/Claude Usage.app"
          sign() {
            codesign --force --sign "Developer ID Application" --options runtime --timestamp "$@"
          }

          # 1. Sign plain Mach-O binaries inside Sparkle (e.g. Autoupdate helper)
          find "$APP/Contents/Frameworks/Sparkle.framework" -type f | while read -r f; do
            if file "$f" 2>/dev/null | grep -q "Mach-O"; then
              sign "$f"
            fi
          done

          # 2. Sign Sparkle XPC service and nested app bundles
          find "$APP/Contents/Frameworks/Sparkle.framework" \( -name "*.xpc" -o -name "*.app" \) | \
            sort -r | while read -r bundle; do
              sign "$bundle"
            done

          # 3. Sign the Sparkle framework itself
          sign "$APP/Contents/Frameworks/Sparkle.framework"

          # 4. Sign the widget extension
          codesign --force --sign "Developer ID Application" \
            --options runtime --timestamp \
            --entitlements ClaudeUsageWidget/Resources/ClaudeUsageWidget.entitlements \
            "$APP/Contents/PlugIns/ClaudeUsageWidgetExtension.appex"

          # 5. Sign the main app
          codesign --force --sign "Developer ID Application" \
            --options runtime --timestamp \
            --entitlements ClaudeUsage/Resources/ClaudeUsage.entitlements \
            "$APP"

          # Verify
          codesign --verify --deep --strict "$APP"
          echo "Signed by: $(codesign -dv "$APP" 2>&1 | grep Authority | head -1)"

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          # Build a temporary icns for the DMG volume icon from asset catalog PNGs
          ICONSET=$(mktemp -d)/AppIcon.iconset
          mkdir -p "$ICONSET"
          ASSET=ClaudeUsage/Sources/Assets.xcassets/AppIcon.appiconset
          cp "$ASSET/icon_16x16.png"      "$ICONSET/icon_16x16.png"
          cp "$ASSET/icon_16x16@2x.png"   "$ICONSET/icon_16x16@2x.png"
          cp "$ASSET/icon_32x32.png"      "$ICONSET/icon_32x32.png"
          cp "$ASSET/icon_32x32@2x.png"   "$ICONSET/icon_32x32@2x.png"
          cp "$ASSET/icon_128x128.png"    "$ICONSET/icon_128x128.png"
          cp "$ASSET/icon_128x128@2x.png" "$ICONSET/icon_128x128@2x.png"
          cp "$ASSET/icon_256x256.png"    "$ICONSET/icon_256x256.png"
          cp "$ASSET/icon_256x256@2x.png" "$ICONSET/icon_256x256@2x.png"
          cp "$ASSET/icon_512x512.png"    "$ICONSET/icon_512x512.png"
          cp "$ASSET/icon_512x512@2x.png" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o /tmp/AppIcon.icns

          mkdir -p dist
          create-dmg \
            --volname "Claude Usage" \
            --volicon /tmp/AppIcon.icns \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Claude Usage.app" 175 190 \
            --hide-extension "Claude Usage.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/ClaudeUsage-${{ steps.version.outputs.VERSION }}.dmg" \
            "build/Claude Usage.app" || \
          hdiutil create \
            -volname "Claude Usage" \
            -srcfolder "build/Claude Usage.app" \
            -ov -format UDZO \
            "dist/ClaudeUsage-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          DMG="dist/ClaudeUsage-${{ steps.version.outputs.VERSION }}.dmg"
          codesign --sign "Developer ID Application" "$DMG"
          # Submit and capture submission ID + result
          RESULT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "9WM2J36V23" \
            --wait --output-format json)
          echo "$RESULT"
          SUBMISSION_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "Accepted" ]; then
            echo "==> Notarization failed ($STATUS). Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$NOTARIZATION_PASSWORD" \
              --team-id "9WM2J36V23"
            exit 1
          fi
          xcrun stapler staple "$DMG"

      - name: Install Sparkle tools
        run: |
          SPARKLE_VERSION="2.7.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          tar -xf /tmp/sparkle.tar.xz -C /tmp ./bin/generate_appcast ./bin/sign_update
          chmod +x /tmp/bin/generate_appcast /tmp/bin/sign_update

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="dist/ClaudeUsage-${{ steps.version.outputs.VERSION }}.dmg"
          DMG_URL="https://github.com/eylonshm/claude-usage-widget/releases/download/${{ github.ref_name }}/ClaudeUsage-${{ steps.version.outputs.VERSION }}.dmg"

          # Sign the DMG and capture the EdDSA signature
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | /tmp/bin/sign_update --ed-key-file - -p "$DMG_PATH")
          LENGTH=$(wc -c < "$DMG_PATH" | tr -d ' ')

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Claude Usage Widget</title>
              <item>
                <title>Version ${{ steps.version.outputs.VERSION }}</title>
                <sparkle:version>${{ steps.version.outputs.VERSION }}</sparkle:version>
                <sparkle:shortVersionString>${{ steps.version.outputs.VERSION }}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>$(date -u "+%a, %d %b %Y %H:%M:%S +0000")</pubDate>
                <enclosure
                  url="${DMG_URL}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${LENGTH}"
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF

      - name: Commit appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClaudeUsage-*.dmg
          generate_release_notes: true
          body: |
            ## Installation

            ### Homebrew (recommended)
            ```bash
            brew install --cask eylonshm/tap/claude-usage-widget
            ```

            ### Manual DMG
            1. Download `ClaudeUsage-${{ steps.version.outputs.VERSION }}.dmg`
            2. Open the DMG and drag **Claude Usage** to your Applications folder

            ## Requirements
            - macOS 14 (Sonoma) or later
            - [Claude Code CLI](https://claude.ai/code) installed and authenticated

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256=$(shasum -a 256 "dist/ClaudeUsage-${VERSION}.dmg" | awk '{print $1}')
          bash scripts/update-tap.sh "$VERSION" "$SHA256" "$TAP_TOKEN"
